			.clearfix{display:inline-block;}

			html,
			body,
			.container {

				height: 100%;

			body {
				position: relative;
			}

			.selected-branch {
				position: absolute;
				top: 0;
				left: 0;
				height: 100%;
				width: 100%;
				background-position: center center;
				background-repeat: no-repeat;
				opacity: 0;
				transition: opacity 0.6s ease-in;
			}

			.branch {
				display: block;
				float: left;
				width: 50%;
				background-size: cover;
				height: 100%;
				min-height: 700px;
				padding: 20px 100px;
				position: relative;
				text-align: center;

				opacity: 0;
				-webkit-transition: opacity 0.4s ease-in, -webkit-transform 0.6s ease-out;
				-moz-transition: opacity 0.4s ease-in, transform 0.6s ease-out;
				-ms-transition: opacity 0.4s ease-in, transform 0.6s ease-out;
				transition: opacity 0.4s ease-in, transform 0.6s ease-out;
			}

			.flossophy {
				background: url('/images/landing/1920/flossophy_landingimage.jpg') center center no-repeat;
				border-right: 1px solid #fff;
			}

			.flossophy.slide {
				-webkit-transform: translateX(-100%);
				-moz-transform: translateX(-100%);
				-ms-transform: translateX(-100%);
				transform: translateX(-100%);
			}

			.flossophy a:hover,
			.clareview a:hover {
				color: #333;
			}

			.clareview {
				background: url('/images/landing/1920/clareviewbelmont_landingimage.jpg') center center no-repeat;
			}

			.clareview.slide {
				-webkit-transform: translateX(100%);
				-moz-transform: translateX(100%);
				-ms-transform: translateX(100%);
				transform: translateX(100%);
			}

			.branch .overlay {
				position: absolute;
				top: 0;
				left: 0;
				height: 100%;
				width: 100%;
				background: rgba(0, 0, 0, 0.75);
				transition: background 0.3s ease-in;
			}

			.branch:hover .overlay {
				background: rgba(0, 0, 0, 0);
			}

			.hover-overlay {
				position: absolute;
				top: 0;
				left: 0;
				height: 100%;
				width: 100%;
				opacity: 0;
				background: url('/images/blue-texture.jpg');
				transition: opacity 0.3s ease-in;
			}

			.branch:hover .hover-overlay {
				opacity: 1;
			}

			.branch .content {
				position: relative;

				opacity: 0;
				-webkit-transform: translateY(20px);
				-moz-transform: translateY(20px);
				-ms-transform: translateY(20px);
				transform: translateY(20px);
				-webkit-transition: opacity 0.6s ease-in, -webkit-transform 0.6s ease-out;
				-moz-transition: opacity 0.6s ease-in, transform 0.6s ease-out;
				-ms-transition: opacity 0.6s ease-in, transform 0.6s ease-out;
				transition: opacity 0.6s ease-in, transform 0.6s ease-out;
			}

			@media screen and (min-width: 769px) {
				.branch .content {
					margin-top: 300px !important;
				}
			}

			.branch.animate {
				opacity: 1;
			}

			.branch .content.animate {
				opacity: 1;
				-webkit-transform: translateY(0);
				-moz-transform: translateY(0);
				-ms-transform: translateY(0);
				transform: translateY(0);
			}

			.branch .content > a {
				display: inline-block;
				margin: 0 0 80px 0;
			}

			img {
				max-width: 90%;
				margin: 0 0 40px 0;
			}

			p {
				color: #fff;
				font-size: 18px;
				padding: 0 0 10px 0;
			}

			a {
				color: inherit;
				text-decoration: none;
				transition: color 0.3s ease-in;
			}

			.text {
				color: #fff;
				position: absolute;
				left: 0;
				right: 0;
				top: 80px;
				margin: 0 auto;
				width: 500px;
				max-width: 100%;
				z-index: 999;
				text-align: center;
				text-shadow: 1px 2px 20px rgba(0, 0, 0, 1);

				opacity: 0;
				-webkit-transform: translateY(20px);
				-moz-transform: translateY(20px);
				-ms-transform: translateY(20px);
				transform: translateY(20px);
				-webkit-transition: opacity 0.6s ease-in, -webkit-transform 0.6s ease-out;
				-moz-transition: opacity 0.6s ease-in, transform 0.6s ease-out;
				-ms-transition: opacity 0.6s ease-in, transform 0.6s ease-out;
				transition: opacity 0.6s ease-in, transform 0.6s ease-out;
			}

			.text .container {
				width: 100%;
				position: relative;
				height: 160px;
			}

			.text .container img {
				position: absolute;
				top: 0;
				left: 0;
				right: 0;
				margin: 0 auto;

				opacity: 0;
				-webkit-transform: translateY(20px);
				-moz-transform: translateY(20px);
				-ms-transform: translateY(20px);
				transform: translateY(20px);
				-webkit-transition: opacity 0.3s ease-in, -webkit-transform 0.3s ease-out, background 0.3s ease-in, color 0.3s ease-in;
				-moz-transition: opacity 0.3s ease-in, transform 0.3s ease-out, background 0.3s ease-in, color 0.3s ease-in;
				-ms-transition: opacity 0.3s ease-in, transform 0.3s ease-out, background 0.3s ease-in, color 0.3s ease-in;
				transition: opacity 0.3s ease-in, transform 0.3s ease-out, background 0.3s ease-in, color 0.3s ease-in;
			}

			.text .container img.animate {
				opacity: 1;
				-webkit-transform: translateY(0);
				-moz-transform: translateY(0);
				-ms-transform: translateY(0);
				transform: translateY(0);
			}

			.text.animate {
				opacity: 1;
				-webkit-transform: translateY(0);
				-moz-transform: translateY(0);
				-ms-transform: translateY(0);
				transform: translateY(0);
			}

			.text img {
				margin: 0;
				max-width: 100%;
				vertical-align: top;
			}

			.text h1 {
				font-size: 90px;
				font-weight: 900;
				font-style: italic;
				line-height: 1em;
			}

			.select {
				color: #fff;
				font-weight: 700;
				font-style: italic;
				font-size: 21px;
				padding: 25px 40px;
				border: 1px solid #fff;
				background: rgba(0, 0, 0, 0.25);
				margin-top: 40px;
				display: inline-block;

				opacity: 0;
				-webkit-transform: translateY(20px);
				-moz-transform: translateY(20px);
				-ms-transform: translateY(20px);
				transform: translateY(20px);
				-webkit-transition: opacity 0.3s ease-in, -webkit-transform 0.3s ease-out, background 0.3s ease-in, color 0.3s ease-in;
				-moz-transition: opacity 0.3s ease-in, transform 0.3s ease-out, background 0.3s ease-in, color 0.3s ease-in;
				-ms-transition: opacity 0.3s ease-in, transform 0.3s ease-out, background 0.3s ease-in, color 0.3s ease-in;
				transition: opacity 0.3s ease-in, transform 0.3s ease-out, background 0.3s ease-in, color 0.3s ease-in;
			}

			.select:hover {
				background: #fff;
				color: #029ccf;
			}

			.branch:hover .select.animate {
				opacity: 1;
				-webkit-transform: translateY(0);
				-moz-transform: translateY(0);
				-ms-transform: translateY(0);
				transform: translateY(0);
			}

			@media screen and (max-width: 1366px) {

			@media screen and (max-width: 768px) {

					margin: -60px auto -100px auto;
					width: 400px;
				}

				.text img {
					max-height: 160px;
					max-width: 100%;
					width: auto;
				}

				.text h1 {
					font-size: 60px;
				}

				.select {
					display: none;
				}
			}

			@media screen and (max-width: 480px) {
				.text {
					width: 300px;
				}

				.text h1 {
					font-size: 48px;
				}
			}
		</style>

		<!--scripts-->
		<script>
			$(document).ready(function() {
				$.ajax({
					url: '/js/ajax/flossophy_landing.php',
					type: 'post',
					success: function(data){
						$('.branch.flossophy .overlay').html(data);

						$.ajax({
							url: '/js/ajax/clareview_landing.php',
							type: 'post',
							success: function(data){
								$('.branch.clareview .overlay').html(data);
							}
						});
					}
				});

				branchContentHeight();

				$(this).delay(1000).queue(function() {
					branchContentHeight();

					$('.branch').addClass('animate').delay(500).queue(function() {
						$('.text').addClass('animate').delay(500).queue(function() {
							var lcount = 0;

							$('.text img').each(function() {
								$(this).delay(lcount).queue(function() {
									$(this).addClass('animate');
								});

								lcount += 200;
							});

							setTimeout(function () {
								$('.branch .content').addClass('animate').delay(500).queue(function() {
									$('.branch .select').addClass('animate');
								});
							}, 1000);
						});
					});
				});
			});

			$(window).resize(function() {
				branchContentHeight();
			});

			function branchContentHeight() {
				$('.branch').each(function() {
					var height = $(this).outerHeight(),
					content = $(this).find('.content');

					content.css('margin-top', 0).css('margin-top', (($(this).css('min-height') == '700px' ? 200 : 0) + (height - content.height()) / ($(this).css('min-height') == '700px' ? 2.5 : 2)) + 'px');
				});
			}

			function middleTextHeight() {
				var target = $('.text');

				if(target.css('top') != '0px') {
					target.css('top', (($('body').height() - target.height()) / 5) + 'px');
				}
			}

			$('.branch').on('click', function(event) {
				event.preventDefault();

				$('.branch').addClass('slide');
				$('.text').removeClass('animate');
				$('body').css('overflow', 'hidden');

				setTimeout(function () {
					window.location.href = event.currentTarget.href;
				}, 600);
			});
		</script>
