// Timeline JS
jQuery(function ($) {
  const $win = $(window);

  $win.on('scroll', function () {
    const scroll    = $win.scrollTop();
    const halfWinH  = $win.height() / 2;

    // Loop through every existing wrapper
    $('.timeline_wrapper_mob').each(function () {
      const $wrap    = $(this);
      const $line    = $wrap.find('.timeline_line_mob');
      const $content = $wrap.find('.timeline_content_mob');

      // Skip if expected elements aren’t present
      if (!$line.length || !$content.length) return;

      /* --------- line‑grow logic ---------- */
      const topOffset  = scroll - $wrap.offset().top + halfWinH;

      const $lastRow   = $content.children('.x-row').last();
      const lastOffset = scroll - $lastRow.offset().top + halfWinH - 10;

      if (topOffset > 0 && lastOffset <= 0) {
        $line.css('height', topOffset + 'px');
      } else if (topOffset <= 0) {
        // reset height when section is above viewport
        $line.css('height', 0);
      }

      /* --------- icon‑activate logic ------- */
      $content.children('.x-row').each(function () {
        const $row      = $(this);
        const rowOffset = scroll - $row.offset().top + halfWinH - 10;
        $row.find('.x-icon').toggleClass('x-active', rowOffset > 0);
      });
    });
  });

  // Trigger once on page load in case a timeline is already in view
  $win.triggerHandler('scroll');
});
