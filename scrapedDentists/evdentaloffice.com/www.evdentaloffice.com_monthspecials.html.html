<script language="javaScript">
// Column Height Script
function pngHeight() {

	if (document.getElementById('nav-left') || document.getElementById('nav-right')) {
		//var pngH = document.getElementById('bottom-of-page').offsetTop;
		var pngNavHeight=document.getElementById('navcontainer').clientHeight;
		var pngH = 50;
	if (document.getElementById('column1') == null) //checking for Hidden pages.
	{
		pngH = pngNavHeight + 205;
		document.getElementById('navcontainer').style.height=pngNavHeight;
		document.getElementById('content').style.height=pngH;
	} else {
		var pngColHeight1=document.getElementById('column1').clientHeight;
		var pngColHeight2=document.getElementById('column2').clientHeight;
		var pngColHeight3=document.getElementById('column3').clientHeight;
		var othFootHeight=40;
		if(document.getElementById('other_footer')) {
			othFootHeight=document.getElementById('other_footer').clientHeight;
		}
		pngColHeight=pngColHeight1;
		if(pngColHeight<pngColHeight2) pngColHeight=pngColHeight2;
		if(pngColHeight<pngColHeight3) pngColHeight=pngColHeight3;
		
		pngColHeight=pngColHeight + othFootHeight;

		if (pngNavHeight<pngColHeight) pngNavHeight=pngColHeight + 29;
		if (pngColHeight<pngNavHeight) pngColHeight=pngNavHeight - 29;
		
		pngH = pngColHeight + 234;
		
		if (document.all) {
			document.getElementById('layout_shadow_left').style.height=pngH;
			document.getElementById('layout_shadow_right').style.height=pngH;
			document.getElementById('navcontainer').style.height=pngNavHeight;
			document.getElementById('content').style.height=pngH;
			} else {
			document.getElementById('layout_shadow_left').style.height=pngH + "px";
			document.getElementById('layout_shadow_right').style.height=pngH + "px";
			document.getElementById('navcontainer').style.height=pngNavHeight + "px";
			document.getElementById('content').style.height=pngH + "px";
			}
		}
	}
}
var oldhandler = window.onload;
window.onload = (typeof oldhandler == "function")
    ? function() { oldhandler(); pngHeight(); } : pngHeight;
</script>
